services:
  dashdash:
    # Pull pre-built image from registry (default):
    image: ghcr.io/theswoosh/dashdash:latest
    # ── OR build locally ──────────────────────────────────────────────────────
    # Comment out the image: line above and uncomment build: below.
    # build: .
    # ─────────────────────────────────────────────────────────────────────────
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config
      - dashdash-data:/data
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /data
      CONFIG_DIR: /config
      # Integration API keys (format: BOARD_INTEGRATION_<ID_UPPERCASE>_<FIELD>)
      # BOARD_INTEGRATION_SONARR_MAIN_KEY: your-sonarr-api-key
    restart: unless-stopped
    # Defense-in-depth: immutable root filesystem (data lives in the volumes),
    # no capabilities beyond what the entrypoint needs (chown volumes, drop to
    # the dashdash user via setpriv), and no privilege re-escalation.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      # NET_RAW: lets the healthcheck widget send ICMP pings (host liveness).
      # The entrypoint hands it to the non-root app user as an ambient capability,
      # so it works even with no-new-privileges. Unlike the old ping_group_range
      # sysctl, this also works in unprivileged LXC (e.g. Proxmox, which grants
      # NET_RAW by default). Remove this line to disable ICMP — bare-host checks
      # then report "unknown" (grey dot); port/URL (TCP) checks keep working.
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  dashdash-data:
