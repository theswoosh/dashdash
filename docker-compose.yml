services:
  dashdash:
    # Pull pre-built image from registry (default):
    image: ghcr.io/theswoosh/dashdash:latest
    # ── OR build locally ──────────────────────────────────────────────────────
    # Comment out the image: line above and uncomment build: below.
    # build: .
    # ─────────────────────────────────────────────────────────────────────────
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config
      - dashdash-data:/data
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /data
      CONFIG_DIR: /config
      # Integration API keys (format: DASHDASH_INTEGRATION_<ID_UPPERCASE>_<FIELD>)
      # DASHDASH_INTEGRATION_SONARR_MAIN_KEY: your-sonarr-api-key
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  dashdash-data:
