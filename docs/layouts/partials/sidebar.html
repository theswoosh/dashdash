{{ $current := . }}
<nav class="sidebar-nav" aria-label="Documentation sections">
  {{ range .Site.Sections.ByWeight }}
    <div class="sidebar-section">
      <a href="{{ .RelPermalink }}" class="sidebar-section-title{{ if eq $current.CurrentSection . }} is-active{{ end }}">{{ .Title }}</a>
      {{ if .Pages }}
      <ul>
        {{ range .Pages.ByWeight }}
        <li><a href="{{ .RelPermalink }}"{{ if eq $current . }} class="is-current" aria-current="page"{{ end }}>{{ .Title }}</a></li>
        {{ end }}
      </ul>
      {{ end }}
    </div>
  {{ end }}
</nav>
