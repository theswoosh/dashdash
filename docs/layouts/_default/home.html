{{ define "main" }}
<section class="hero">
  <h1>dashdash</h1>
  <p class="tagline">{{ .Content }}</p>
</section>

<section class="section-cards">
  {{ range .Site.Sections.ByWeight }}
  <a class="section-card" href="{{ .RelPermalink }}">
    <h2>{{ .Title }}</h2>
    <p>{{ .Params.description }}</p>
  </a>
  {{ end }}
</section>
{{ end }}
