name: Build & publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Never publish an image from a commit whose CI failed (2026-07-16 a red
  # E2E job still shipped :latest). CI doesn't run on tags, but tags point
  # at commits already CI'd on main, so the check-run lookup resolves there
  # too; a never-CI'd SHA fails safe after the timeout.
  wait-for-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      checks: read
    steps:
      - name: Wait for the CI quality-gates check on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 60); do
            status=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?check_name=Automated%20quality%20gates" \
              --jq '.check_runs[0] | "\(.status) \(.conclusion)"' 2>/dev/null || echo "none none")
            case "$status" in
              "completed success") echo "CI green"; exit 0 ;;
              "completed "*) echo "CI concluded: $status"; exit 1 ;;
              *) echo "waiting ($status)"; sleep 15 ;;
            esac
          done
          echo "CI did not complete within 15 min"; exit 1

  build-and-push:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    # Multi-arch QEMU builds normally take 4-8 min; a runner stall on
    # 2026-07-16 ran 60+ min (default cap is 6h). Cancel runaways early.
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # full semver on git tags: v0.1.0 → 0.1.0
            type=semver,pattern={{version}}
            # minor: v0.1.0 → 0.1
            type=semver,pattern={{major}}.{{minor}}
            # sha for debugging
            type=sha,prefix=sha-,format=short

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
